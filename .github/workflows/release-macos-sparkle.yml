name: Release macOS Sparkle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.0.0'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build notarized macOS release
    runs-on: macos-latest
    env:
      SCHEME: ConnorGraphAgentMacApp
      APP_NAME: 康纳同学
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
      DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      CONNOR_UPDATES_DEPLOY_KEY: ${{ secrets.CONNOR_UPDATES_DEPLOY_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Import Developer ID certificate
        if: env.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 != ''
        shell: bash
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build, notarize, and generate appcast
        shell: bash
        env:
          DOWNLOAD_URL_PREFIX: https://github.com/${{ github.repository }}/releases/download/${{ inputs.tag || github.ref_name }}
        run: scripts/release-macos-sparkle.sh

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            build/release/appcast-archives/*.zip
            build/release/appcast-archives/appcast.xml
          generate_release_notes: true

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: sparkle-appcast
          path: build/release/appcast-archives/appcast.xml

      - name: Publish appcast to connor-updates Pages repo
        if: env.CONNOR_UPDATES_DEPLOY_KEY != ''
        shell: bash
        run: |
          set -euo pipefail
          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh
          printf '%s\n' "$CONNOR_UPDATES_DEPLOY_KEY" > ~/.ssh/connor_updates_deploy_key
          chmod 600 ~/.ssh/connor_updates_deploy_key
          ssh-add ~/.ssh/connor_updates_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git clone git@github.com:duanshiwen/connor-updates.git "$RUNNER_TEMP/connor-updates"
          mkdir -p "$RUNNER_TEMP/connor-updates/stable"
          cp build/release/appcast-archives/appcast.xml "$RUNNER_TEMP/connor-updates/stable/appcast.xml"
          cd "$RUNNER_TEMP/connor-updates"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stable/appcast.xml
          git commit -m "Update Connor stable appcast for ${{ github.ref_name }}" || exit 0
          git push origin HEAD:main
